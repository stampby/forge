  <rect x="88" y="16" width="8" height="8" fill="#ff6600" opacity="0.25"/>
  <!-- Label -->
  <text x="64" y="108" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff6600" font-weight="bold">forge</text>
</svg>
